<style>
    body {
      max-width: 42em;
    }
    .source-image-link-row {
      display: block;
      width: fit-content;
      margin: 0.125em 0 0.75em auto;
      line-height: 1;
    }
    .source-image-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .image-understanding-layout {
      margin: 1em 0;
    }
    .image-understanding-layout__media {
      min-width: 0;
    }
    .image-understanding-layout__media > img {
      display: block;
      width: 100%;
      height: auto;
    }
    .image-understanding-layout__media .source-image-link-row {
      margin-bottom: 0;
    }
    .image-understanding {
      width: 18rem;
      max-width: 100%;
      margin: 0.5rem 0 1rem 0;
      padding: 0.875rem 1rem;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      background: #fafafa;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .image-understanding strong {
      display: inline-block;
      margin-right: 0.375rem;
    }
    @media (min-width: 1200px) {
      .image-understanding-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 18rem;
        column-gap: 1.25rem;
        align-items: start;
        width: calc(100% + 19.25rem);
      }
      .image-understanding {
        margin: 0;
      }
      .image-understanding-layout__media {
        max-width: 100%;
      }
    }
    @media (max-width: 1199px) {
      .image-understanding {
        width: auto;
      }
    }
    table {
      margin: 1em 0;
      border-collapse: collapse;
      width: 100%;
      overflow-x: auto;
      display: block;
      font-variant-numeric: lining-nums tabular-nums;
    }
    table caption {
      margin-bottom: 0.75em;
    }
    tbody {
      margin-top: 0.5em;
      border-top: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
    }
    th {
      border-top: 1px solid #1a1a1a;
      border-right: 1px solid #d9d9d9;
      border-bottom: 1px solid #d9d9d9;
      border-left: 1px solid #d9d9d9;
      padding: 0.25em 0.5em 0.25em 0.5em;
    }
    td {
      border-right: 1px solid #d9d9d9;
      border-bottom: 1px solid #d9d9d9;
      border-left: 1px solid #d9d9d9;
      padding: 0.125em 0.5em 0.25em 0.5em;
    }
    tbody tr:last-child td {
      border-bottom: 0;
    }
    dialog.source-image-modal {
      border: 0;
      border-radius: 12px;
      padding: 0;
      max-width: min(92vw, 1200px);
      max-height: 92vh;
      background: transparent;
    }
    dialog.source-image-modal::backdrop {
      background: rgba(0, 0, 0, 0.65);
    }
    .source-image-modal__surface {
      position: relative;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .source-image-modal__close {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 0;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.08);
      width: 32px;
      height: 32px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }
    .source-image-modal__image {
      display: block;
      max-width: min(88vw, 1160px);
      max-height: calc(92vh - 32px);
      width: auto;
      height: auto;
    }
</style>
<dialog class="source-image-modal" aria-label="ソース画像">
  <div class="source-image-modal__surface">
    <button class="source-image-modal__close" type="button" aria-label="閉じる">×</button>
    <img class="source-image-modal__image" alt="ソース画像" />
  </div>
</dialog>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const modal = document.querySelector(".source-image-modal");
    if (!(modal instanceof HTMLDialogElement)) {
      return;
    }
    const modalImage = modal.querySelector(".source-image-modal__image");
    const closeButton = modal.querySelector(".source-image-modal__close");
    if (!(modalImage instanceof HTMLImageElement) || !(closeButton instanceof HTMLButtonElement)) {
      return;
    }

    const closeModal = () => {
      modal.close();
      modalImage.removeAttribute("src");
    };

    document.querySelectorAll(".source-image-link").forEach((link) => {
      if (!(link instanceof HTMLAnchorElement)) {
        return;
      }
      link.addEventListener("click", (event) => {
        event.preventDefault();
        modalImage.src = link.href;
        modal.showModal();
      });
    });

    closeButton.addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });
    modal.addEventListener("close", () => {
      modalImage.removeAttribute("src");
    });
  });
</script>
