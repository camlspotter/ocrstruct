name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Run pyright
        run: uv run pyright

      - name: Run targeted pytest suite
        run: >-
          uv run --with pytest python -m pytest
          tests/test_html.py
          tests/test_middle_to_markdown.py
          tests/test_middle_unicode.py
